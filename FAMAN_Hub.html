function ProgressBar({ value, color = COLORS.gold, height = 8 }) {
  return (
    <div style={{ width: "100%", background: COLORS.border, borderRadius: height / 2, height, overflow: "hidden" }}>
      <div style={{ width: `${Math.min(value, 100)}%`, background: color, height: "100%", borderRadius: height / 2, transition: "width 0.5s ease" }} />
    </div>
  );
}

function Badge({ children, bg, color }) {
  return <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 600, background: bg, color, whiteSpace: "nowrap" }}>{children}</span>;
}

function Card({ children, style, onClick }) {
  return (
    <div onClick={onClick} style={{ background: COLORS.card, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 16, marginBottom: 12, cursor: onClick ? "pointer" : "default", transition: "box-shadow 0.2s", ...style }}
      onMouseEnter={e => onClick && (e.currentTarget.style.boxShadow = "0 2px 8px rgba(26,58,42,0.1)")}
      onMouseLeave={e => onClick && (e.currentTarget.style.boxShadow = "none")}>
      {children}
    </div>
  );
}

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,0.4)" }} onClick={onClose}>
      <div style={{ background: COLORS.card, borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 480, maxHeight: "85vh", overflow: "auto", padding: "20px 16px 32px" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ margin: 0, fontSize: 18, color: COLORS.forest }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: COLORS.textMuted }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function InputField({ label, value, onChange, type = "text", placeholder, options }) {
  const base = { width: "100%", padding: "10px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 15, fontFamily: "inherit", color: COLORS.text, background: COLORS.bg, outline: "none", boxSizing: "border-box" };
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 13, color: COLORS.textMuted, marginBottom: 4, fontWeight: 500 }}>{label}</label>
      {options ? (
        <select value={value} onChange={e => onChange(e.target.value)} style={{ ...base, appearance: "auto" }}>
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      ) : type === "textarea" ? (
        <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={3} style={{ ...base, resize: "vertical" }} />
      ) : (
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={base} />
      )}
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", style: s }) {
  const styles = {
    primary: { background: COLORS.forest, color: "#fff" },
    gold: { background: COLORS.gold, color: "#fff" },
    outline: { background: "transparent", color: COLORS.forest, border: `1.5px solid ${COLORS.forest}` },
    danger: { background: COLORS.danger, color: "#fff" },
  };
  return <button onClick={onClick} style={{ padding: "10px 20px", borderRadius: 8, border: "none", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", ...styles[variant], ...s }}>{children}</button>;
}

// ============ TAB: PLANNING ============
function PlanningTab({ tasks, saveTasks }) {
  const [selected, setSelected] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const globalProgress = tasks.length > 0 ? Math.round(tasks.reduce((s, t) => s + t.progress, 0) / tasks.length) : 0;

  const updateTask = (id, updates) => {
    const next = tasks.map(t => t.id === id ? { ...t, ...updates } : t);
    saveTasks(next);
  };

  const addTask = (task) => {
    saveTasks([...tasks, { ...task, id: "t" + Date.now(), progress: 0, status: "pending" }]);
    setShowAdd(false);
  };

  const deleteTask = (id) => {
    if (confirm("Supprimer cette tâche ?")) saveTasks(tasks.filter(t => t.id !== id));
    setSelected(null);
  };

  const sel = tasks.find(t => t.id === selected);

  return (
    <div>
      <Card style={{ background: COLORS.forest, border: "none", color: "#fff" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 13, opacity: 0.8 }}>Avancement global</span>
          <span style={{ fontSize: 24, fontWeight: 700, color: COLORS.gold }}>{globalProgress}%</span>
        </div>
        <ProgressBar value={globalProgress} color={COLORS.gold} height={10} />
        <div style={{ display: "flex", gap: 16, marginTop: 12, fontSize: 12, opacity: 0.7 }}>
          <span>{tasks.filter(t => t.status === "completed").length} terminées</span>
          <span>{tasks.filter(t => t.status === "in_progress").length} en cours</span>
          <span>{tasks.filter(t => t.status === "delayed").length} en retard</span>
        </div>
      </Card>

      {tasks.map(t => (
        <Card key={t.id} onClick={() => setSelected(t.id)} style={{ borderLeft: `4px solid ${catColors[t.category] || COLORS.gold}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.text, marginBottom: 4 }}>{t.title}</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                {t.start && t.end ? `${new Date(t.start).toLocaleDateString("fr-FR", { day: "numeric", month: "short" })} → ${new Date(t.end).toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" })}` : "Dates à définir"}
              </div>
              {t.milestone && <div style={{ fontSize: 11, color: COLORS.gold, fontWeight: 600, marginTop: 4 }}>🏁 {t.milestone}</div>}
            </div>
            <Badge bg={statusColors[t.status]?.bg} color={statusColors[t.status]?.text}>{statusColors[t.status]?.label}</Badge>
          </div>
          <div style={{ marginTop: 8 }}>
            <ProgressBar value={t.progress} color={catColors[t.category] || COLORS.gold} />
          </div>
        </Card>
      ))}

      <Btn onClick={() => setShowAdd(true)} variant="gold" style={{ width: "100%", marginTop: 8 }}>+ Ajouter une tâche</Btn>

      <Modal open={!!sel} onClose={() => setSelected(null)} title="Modifier la tâche">
        {sel && (
          <div>
            <InputField label="Titre" value={sel.title} onChange={v => updateTask(sel.id, { title: v })} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <InputField label="Début" type="date" value={sel.start || ""} onChange={v => updateTask(sel.id, { start: v })} />
              <InputField label="Fin" type="date" value={sel.end || ""} onChange={v => updateTask(sel.id, { end: v })} />
            </div>
            <InputField label="Statut" value={sel.status} onChange={v => updateTask(sel.id, { status: v })} options={[
              { value: "pending", label: "À faire" }, { value: "in_progress", label: "En cours" },
              { value: "completed", label: "Terminé" }, { value: "delayed", label: "En retard" }, { value: "blocked", label: "Bloqué" }
            ]} />
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 13, color: COLORS.textMuted, marginBottom: 4, fontWeight: 500 }}>Avancement : {sel.progress}%</label>
              <input type="range" min="0" max="100" step="5" value={sel.progress} onChange={e => updateTask(sel.id, { progress: parseInt(e.target.value) })}
                style={{ width: "100%", accentColor: COLORS.forest }} />
            </div>
            <InputField label="Jalon" value={sel.milestone || ""} onChange={v => updateTask(sel.id, { milestone: v })} placeholder="Ex: Dalle coulée" />
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <Btn onClick={() => setSelected(null)} style={{ flex: 1 }}>Enregistrer</Btn>
              <Btn variant="danger" onClick={() => deleteTask(sel.id)}>Supprimer</Btn>
            </div>
          </div>

    const ids = budget.filter(b => b.category === cat).map(b => b.id);
    return payments.filter(p => ids.includes(p.budgetLineId)).reduce((s, p) => s + p.amount, 0);
  };

  const catPlanned = (cat) => budget.filter(b => b.category === cat).reduce((s, b) => s + b.planned, 0);

  const updateBudgetLine = (id, planned) => {
    saveBudget(budget.map(b => b.id === id ? { ...b, planned } : b));
  };

  return (
    <div>
      <Card style={{ background: COLORS.forest, border: "none", color: "#fff" }}>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 2 }}>Budget total</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.gold }}>{fmt(totalPlanned)} <span style={{ fontSize: 14, opacity: 0.7 }}>FCFA</span></div>
        </div>
        <ProgressBar value={pct(totalSpent, totalPlanned)} color={totalSpent > totalPlanned ? COLORS.danger : COLORS.gold} height={10} />
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 12, opacity: 0.8 }}>
          <span>Payé : {fmt(totalSpent)}</span>
          <span>Reste : {fmt(totalPlanned - totalSpent)}</span>
        </div>
      </Card>

      {categories.map(cat => {
        const cp = catPlanned(cat);
        const cs = catSpent(cat);
        const over = cs > cp;
        return (
          <Card key={cat}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 15, fontWeight: 700, color: COLORS.forest }}>{cat}</span>
              <span style={{ fontSize: 13, color: over ? COLORS.danger : COLORS.textMuted, fontWeight: 600 }}>{fmt(cs)} / {fmt(cp)}</span>
            </div>
            <ProgressBar value={pct(cs, cp)} color={over ? COLORS.danger : COLORS.gold} />
            <div style={{ marginTop: 10 }}>
              {budget.filter(b2 => b2.category === cat).map(line => {
                const lineSpent = payments.filter(p2 => p2.budgetLineId === line.id).reduce((s, p2) => s + p2.amount, 0);
                return (
                  <div key={line.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${COLORS.border}`, fontSize: 13 }}>
                    <span style={{ color: COLORS.text, flex: 1 }}>{line.sub}</span>
                    <span style={{ color: COLORS.textMuted, marginRight: 8, minWidth: 80, textAlign: "right" }}>{fmt(lineSpent)} / {fmt(line.planned)}</span>
                    <button onClick={() => setShowPayment(line.id)} style={{ background: COLORS.goldMuted, border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, color: COLORS.forest, cursor: "pointer", fontWeight: 600 }}>+ Payer</button>
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })}

      <Btn onClick={() => setShowAddLine(true)} variant="outline" style={{ width: "100%", marginTop: 4 }}>+ Nouveau poste de budget</Btn>

      <Modal open={!!showPayment} onClose={() => setShowPayment(null)} title="Enregistrer un paiement">
        <PaymentForm budgetLineId={showPayment} budgetLines={budget} onAdd={addPayment} onCancel={() => setShowPayment(null)} />
      </Modal>

      <Modal open={showAddLine} onClose={() => setShowAddLine(false)} title="Nouveau poste de budget">
        <AddBudgetForm categories={categories} onAdd={(line) => { saveBudget([...budget, { ...line, id: "b" + Date.now(), spent: 0 }]); setShowAddLine(false); }} onCancel={() => setShowAddLine(false)} />
      </Modal>
    </div>
  );
}

// ====== Components ======

function ProgressBar({ value, color = C.gold, height = 8 }) {
  return (
    <div style={{ width:"100%", background:C.border, borderRadius:height/2, height, overflow:"hidden" }}>
      <div style={{ width:`${Math.min(value,100)}%`, background:color, height:"100%", borderRadius:height/2, transition:"width 0.5s ease" }} />
    </div>
  );
}

function Badge({ children, bg, color }) {
  return <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:12, fontSize:11, fontWeight:600, background:bg, color, whiteSpace:"nowrap" }}>{children}</span>;
}

function Card({ children, style, onClick }) {
  return (
    <div onClick={onClick} style={{ background:C.card, borderRadius:12, border:`1px solid ${C.border}`, padding:16, marginBottom:10, cursor:onClick?"pointer":"default", transition:"box-shadow 0.2s", ...style }}
      onMouseEnter={e => onClick && (e.currentTarget.style.boxShadow="0 2px 8px rgba(26,58,42,0.08)")}
      onMouseLeave={e => onClick && (e.currentTarget.style.boxShadow="none")}>
      {children}
    </div>
  );
}

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000, display:"flex", alignItems:"flex-end", justifyContent:"center", background:"rgba(0,0,0,0.4)" }} onClick={onClose}>
      <div style={{ background:C.card, borderRadius:"16px 16px 0 0", width:"100%", maxWidth:480, maxHeight:"85vh", overflow:"auto", padding:"20px 16px 32px" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <h3 style={{ margin:0, fontSize:18, color:C.forest }}>{title}</h3>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:C.muted }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Btn({ children, onClick, variant="primary", style:s }) {
  const styles = { primary:{background:C.forest,color:"#fff"}, gold:{background:C.gold,color:"#fff"}, outline:{background:"transparent",color:C.forest,border:`1.5px solid ${C.forest}`}, danger:{background:C.danger,color:"#fff"} };
  return <button onClick={onClick} style={{ padding:"10px 20px", borderRadius:8, border:"none", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit", ...styles[variant], ...s }}>{children}</button>;
}

function InputField({ label, value, onChange, type="text", placeholder }) {
  const base = { width:"100%", padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:15, fontFamily:"inherit", color:C.text, background:C.bg, outline:"none", boxSizing:"border-box" };
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ display:"block", fontSize:13, color:C.muted, marginBottom:4, fontWeight:500 }}>{label}</label>
      {type === "textarea" ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={2} style={{...base, resize:"vertical"}} />
        : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={base} />}
    </div>
  );
}

function VaccinsTab({ vaccines, save }) {
  const [j0, setJ0] = useStorage("deploy:j0_date", "");
  const [showAdd, setShowAdd] = useState(false);
  const [addForm, setAddForm] = useState({ day:"", name:"", route:"", notes:"", mandatory:true });
  const [detail, setDetail] = useState(null);

  const toggle = (id) => save(vaccines.map(v => v.id===id ? {...v, done:!v.done} : v));
  const done = vaccines.filter(v=>v.done).length;

  const calcDate = (dayStr) => {
    if (!j0) return null;
    const base = new Date(j0);
    const m = dayStr.match(/^J(\d+)/);
    if (m) { base.setDate(base.getDate() + parseInt(m[1]) - 1); return base; }
    const sw = dayStr.match(/^S(\d+)/);
    if (sw) { base.setDate(base.getDate() + (parseInt(sw[1]) - 1) * 7); return base; }
    return null;
  };

  const isUpcoming = (dayStr) => {
    const d = calcDate(dayStr);
    if (!d) return false;
    const now = new Date();
    const diff = (d - now) / 86400000;
    return diff >= 0 && diff <= 3;
  };

  const isPast = (dayStr) => {
    const d = calcDate(dayStr);
    if (!d) return false;
    return d < new Date();
  };

  const addVaccine = () => {
    if (!addForm.day || !addForm.name) return;
    save([...vaccines, { ...addForm, id:"v"+Date.now(), done:false }]);
    setAddForm({ day:"", name:"", route:"", notes:"", mandatory:true });
    setShowAdd(false);
  };

  const selVax = vaccines.find(v=>v.id===detail);

  return (
    <div>
      <Card style={{ background:C.forest, border:"none", color:"#fff" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={{ fontSize:13, opacity:0.8 }}>Calendrier vaccinal ISA Brown</span>
          <span style={{ fontSize:22, fontWeight:700, color:C.gold }}>{done}/{vaccines.length}</span>
        </div>
        <ProgressBar value={vaccines.length>0?Math.round(done/vaccines.length*100):0} color={C.gold} height={10} />
      </Card>

      {/* J0 date picker */}
      <Card style={{ borderLeft:`4px solid ${C.purple}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.forest }}>📅 Date J0 — Réception poussins</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Toutes les dates du calendrier vaccinal sont calculées à partir de J0</div>
          </div>
        </div>
        <input type="date" value={j0} onChange={e=>setJ0(e.target.value)}
          style={{ marginTop:8, width:"100%", padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, fontSize:15, fontFamily:"inherit", color:C.text, background:C.bg, boxSizing:"border-box" }} />
        {j0 && <div style={{ fontSize:12, color:C.gold, fontWeight:600, marginTop:6 }}>J0 = {new Date(j0).toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}</div>}
      </Card>

      {/* Vaccine timeline */}
      {vaccines.map((vax, i) => {
        const scheduled = calcDate(vax.day);
        const upcoming = isUpcoming(vax.day);
        const past = isPast(vax.day) && !vax.done;
        const borderColor = vax.done ? C.success : upcoming ? C.warning : past ? C.danger : C.border;

        return (
          <div key={vax.id} style={{ display:"flex", gap:0, marginBottom:2 }}>
            {/* Timeline line */}
            <div style={{ width:32, display:"flex", flexDirection:"column", alignItems:"center", flexShrink:0 }}>
              <div style={{
                width:20, height:20, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, zIndex:1,
                background: vax.done ? C.success : upcoming ? C.warning : past ? C.danger : C.bg,
                border: `2px solid ${vax.done ? C.success : upcoming ? C.warning : past ? C.danger : C.border}`,
              }}>
                {vax.done && <span style={{ color:"#fff", fontSize:12, fontWeight:700 }}>✓</span>}
              </div>
              {i < vaccines.length - 1 && <div style={{ width:2, flex:1, background:C.border, minHeight:20 }} />}
            </div>

            {/* Card */}
            <div onClick={()=>setDetail(vax.id)} style={{
              flex:1, background:C.card, borderRadius:10, border:`1px solid ${borderColor}`, padding:"10px 12px", marginBottom:6, cursor:"pointer",
              borderLeft:`4px solid ${borderColor}`, opacity: vax.done ? 0.7 : 1
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:6 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{vax.day} — {vax.name}</div>
                  <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{vax.route}</div>
                  {scheduled && <div style={{ fontSize:11, color: upcoming ? C.warning : past && !vax.done ? C.danger : C.muted, fontWeight:600, marginTop:2 }}>
                    {scheduled.toLocaleDateString("fr-FR", { day:"numeric", month:"short", year:"numeric" })}
                    {upcoming && !vax.done && " ⚠️ Dans moins de 3 jours !"}
                    {past && !vax.done && " ❗ Date dépassée !"}
                  </div>}
                </div>
                <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                  {vax.mandatory ? <Badge bg={C.dangerBg} color={C.danger}>Obligatoire</Badge> : <Badge bg={C.bg} color={C.muted}>Optionnel</Badge>}

            </div>
          </div>
        );
      })}

      <Btn onClick={()=>setShowAdd(true)} variant="gold" style={{ width:"100%", marginTop:8 }}>+ Ajouter un vaccin</Btn>

      {/* Detail modal */}
      <Modal open={!!selVax} onClose={()=>setDetail(null)} title={selVax ? `${selVax.day} — ${selVax.name}` : ""}>
        {selVax && (
          <div>
            <div style={{ background:C.bg, borderRadius:8, padding:12, marginBottom:12 }}>
              <div style={{ fontSize:13, color:C.muted, marginBottom:4 }}>Voie d'administration</div>
              <div style={{ fontSize:15, fontWeight:600, color:C.forest }}>{selVax.route}</div>
            </div>
            {selVax.notes && (
              <div style={{ background:C.warningBg, borderRadius:8, padding:12, marginBottom:12 }}>
                <div style={{ fontSize:13, color:C.warning, fontWeight:600 }}>💡 Instructions</div>
                <div style={{ fontSize:13, color:C.text, marginTop:4 }}>{selVax.notes}</div>
              </div>
            )}
            {j0 && calcDate(selVax.day) && (
              <div style={{ background:C.purpleBg, borderRadius:8, padding:12, marginBottom:12 }}>
                <div style={{ fontSize:13, color:C.purple, fontWeight:600 }}>📅 Date programmée</div>
                <div style={{ fontSize:15, fontWeight:700, color:C.forest, marginTop:4 }}>
                  {calcDate(selVax.day).toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}
                </div>
              </div>
            )}
            <div style={{ display:"flex", gap:8, marginTop:16 }}>
              <Btn onClick={()=>{toggle(selVax.id);setDetail(null);}} variant={selVax.done?"outline":"gold"} style={{ flex:1 }}>
                {selVax.done ? "Marquer non fait" : "✓ Marquer fait"}
              </Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Add modal */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Ajouter un vaccin">
        <InputField label="Jour / Semaine" value={addForm.day} onChange={v=>setAddForm({...addForm,day:v})} placeholder="Ex: J14, S12, Ponte: mensuel" />
        <InputField label="Nom du vaccin" value={addForm.name} onChange={v=>setAddForm({...addForm,name:v})} placeholder="Ex: Newcastle LaSota rappel" />
        <InputField label="Voie d'administration" value={addForm.route} onChange={v=>setAddForm({...addForm,route:v})} placeholder="Ex: Eau de boisson" />
        <InputField label="Notes / instructions" value={addForm.notes} onChange={v=>setAddForm({...addForm,notes:v})} type="textarea" placeholder="Optionnel" />
        <div style={{ display:"flex", gap:8, marginTop:8 }}>
          <Btn onClick={addVaccine} style={{ flex:1 }} variant="gold">Ajouter</Btn>

        </div>
      </Modal>
    </div>
  );

// ====== TAB STOCK ======
function StockTab({ supply, save }) {
  const [movements, saveMovements] = useStorage("deploy:stock_movements", []);
  const [showAction, setShowAction] = useState(null); // {itemId, type: 'in'|'out'|'recal'}
  const [showAdd, setShowAdd] = useState(false);
  const [showHistory, setShowHistory] = useState(null);

  // Calculate current stock from movements
  const getStock = (itemId) => {
    const itemMoves = movements.filter(m => m.itemId === itemId).sort((a,b) => new Date(a.date) - new Date(b.date));
    let stock = 0;
    for (const m of itemMoves) {
      if (m.type === "recal") stock = m.qty;
      else if (m.type === "in") stock += m.qty;
      else if (m.type === "out") stock -= m.qty;
    }
    return Math.max(0, stock);
  };

  // Get consumption for last 7 days
  const getWeekConsumption = (itemId) => {
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
    return movements.filter(m => m.itemId === itemId && m.type === "out" && new Date(m.date) >= weekAgo).reduce((s, m) => s + m.qty, 0);
  };

  const addMovement = (itemId, type, qty, note) => {
    if (!qty || qty <= 0) return;
    const m = { id: "m" + Date.now(), itemId, type, qty: parseInt(qty), note: note || "", date: new Date().toISOString(), by: "Manœuvre" };
    saveMovements([...movements, m]);
    setShowAction(null);
  };

  const alertItems = supply.filter(s => getStock(s.id) < s.minStock && s.minStock > 0);

  return (
    <div>
      <Card style={{ background:C.forest, border:"none", color:"#fff" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <span style={{ fontSize:13, opacity:0.8 }}>Gestion des stocks</span>
          <span style={{ fontSize:14, fontWeight:700, color: alertItems.length > 0 ? C.danger : C.gold }}>
            {alertItems.length > 0 ? `${alertItems.length} alerte(s)` : "Stock OK"}
          </span>
        </div>
        <div style={{ fontSize:11, opacity:0.6 }}>Entrées, sorties et stock auto-calculé</div>
      </Card>

      {/* Alerts */}
      {alertItems.map(item => (
        <div key={item.id+"alert"} style={{ display:"flex", gap:8, padding:"8px 12px", background:C.dangerBg, borderLeft:`4px solid ${C.danger}`, borderRadius:"0 8px 8px 0", marginBottom:6, alignItems:"center" }}>
          <span style={{ fontSize:14 }}>🔴</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.text }}>{item.name} — stock bas !</div>
            <div style={{ fontSize:11, color:C.muted }}>Actuel : {getStock(item.id)} {item.unit} — Minimum : {item.minStock} {item.unit}</div>
          </div>
        </div>
      ))}

      {supply.map(item => {
        const stock = getStock(item.id);
        const isLow = stock < item.minStock && item.minStock > 0;
        const stockPct = item.minStock > 0 ? Math.min(100, Math.round(stock / item.minStock * 100)) : (stock > 0 ? 100 : 0);
        const weekUse = getWeekConsumption(item.id);
        const daysLeft = weekUse > 0 ? Math.round(stock / (weekUse / 7)) : null;

        return (
          <Card key={item.id} style={{ borderLeft:`4px solid ${isLow ? C.danger : stock > 0 ? C.success : C.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{item.name}</div>
                <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{item.supplier}{item.backup ? ` | Backup : ${item.backup}` : ""}</div>
                <div style={{ fontSize:11, color:C.muted }}>{fmt(item.price)} FCFA/{item.unit} — Besoin : {fmt(item.monthlyQty)} {item.unit}/mois</div>

              <div style={{ textAlign:"right", flexShrink:0 }}>
                <div style={{ fontSize:20, fontWeight:700, color: isLow ? C.danger : C.forest }}>{stock}</div>
                <div style={{ fontSize:10, color:C.muted }}>{item.unit}</div>
                {daysLeft !== null && <div style={{ fontSize:10, fontWeight:600, color: daysLeft < 5 ? C.danger : daysLeft < 10 ? C.warning : C.success, marginTop:2 }}>~{daysLeft}j de stock</div>}

              </button>
            </div>

        {showHistory && (() => {

function MovementForm({ item, type, currentStock, onSubmit, onCancel }) {
  const [qty, setQty] = useState("");

  const labels = {
    in: { title:"Quantité reçue", placeholder:"Ex: 10 sacs livrés", btnLabel:"Enregistrer la réception", btnColor:"primary", desc:`Stock actuel : ${currentStock} ${item.unit}. Après réception : ${currentStock + (parseInt(qty)||0)} ${item.unit}` },
    out: { title:"Quantité distribuée / utilisée", placeholder:"Ex: aliment distribué ce matin", btnLabel:"Enregistrer la sortie", btnColor:"gold", desc:`Stock actuel : ${currentStock} ${item.unit}. Après sortie : ${Math.max(0, currentStock - (parseInt(qty)||0))} ${item.unit}` },
    recal: { title:`Stock réel compté (${item.unit})`, placeholder:"Inventaire physique — nombre exact compté", btnLabel:"Recaler le stock", btnColor:"primary", desc:`Stock calculé : ${currentStock} ${item.unit}. Sera remplacé par le comptage réel.` },

  const l = labels[type];

  return (

    </div>
  );
}

                      → Passer à "{nextStage.label}"
                    </button>
                  )}

              );

      <Btn onClick={()=>setShowAdd(true)} variant="gold" style={{ width:"100%", marginTop:8 }}>+ Ajouter un prospect</Btn>

function ActionsTab({ actions, save }) {

  };

  const done = actions.filter(a=>a.status==="done").length;

  const statusInfo = { todo: { label:"À faire", bg:"#F1F5F9", color:"#64748B" }, in_progress: { label:"En cours", bg:C.goldMuted, color:C.forest }, done: { label:"Fait", bg:C.successBg, color:C.success } };

  const addAction = (a) => {
    save([...actions, { ...a, id:"a"+Date.now(), status:"todo" }]);

                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:4, alignItems:"center" }}>
                  {a.responsible && <span style={{ fontSize:11, color:C.muted }}>👤 {a.responsible}</span>}
                  {a.dueDate && <span style={{ fontSize:11, color:isOverdue?C.danger:C.muted, fontWeight:isOverdue?600:400 }}>
                    📅 {new Date(a.dueDate).toLocaleDateString("fr-FR", { day:"numeric", month:"short" })}{isOverdue && " ⚠️"}
                  </span>}
                  <Badge bg={si.bg} color={si.color}>{si.label}</Badge>
                </div>
                {a.notes && <div style={{ fontSize:11, color:C.muted, marginTop:4, fontStyle:"italic" }}>{a.notes}</div>}
              </div>
            </div>
          </Card>

function CircleGauge({ value, size = 120, strokeWidth = 10, color = C.gold, label, sub }) {
  const r = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (circ * Math.min(value, 100)) / 100;
  return (
    <div style={{ textAlign: "center" }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={strokeWidth} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 1s ease" }} />
      </svg>
      <div style={{ marginTop: -size/2 - 16, position: "relative", height: size/2 + 16 }}>
        <div style={{ fontSize: size > 100 ? 28 : 20, fontWeight: 700, color: C.forest }}>{value}%</div>
        {sub && <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{sub}</div>}
      </div>
      {label && <div style={{ fontSize: 12, color: C.muted, fontWeight: 500, marginTop: 4 }}>{label}</div>}
    </div>
  );
}

function MilestoneItem({ task, isNext }) {
  const dateStr = task.end ? new Date(task.end).toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) : "—";
  const isPast = task.end && new Date(task.end) < new Date();
  const isDone = task.status === "completed";
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
      <div style={{
        width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
        background: isDone ? C.success : isNext ? C.gold : isPast ? C.danger : C.border,
        color: "#fff", fontSize: isDone ? 16 : 12, fontWeight: 700
      }}>
        {isDone ? "✓" : isNext ? "→" : isPast ? "!" : "○"}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{task.milestone || task.title}</div>
        <div style={{ fontSize: 11, color: C.muted }}>{task.title !== task.milestone ? task.title : ""}</div>
      </div>
      <div style={{ fontSize: 12, fontWeight: 600, color: isDone ? C.success : isPast && !isDone ? C.danger : C.muted, whiteSpace: "nowrap" }}>{dateStr}</div>
    </div>
  );
}

    const poulesEff = nbPoules;

    const platMois = Math.round(platJour * 30);

      ? Math.round(prixVenteMoyen * ((100 - partKiosque) / 100) + prixKiosque * (partKiosque / 100))

    const emballages = platMois * prixAlveole;
    const transportMois = showKiosque ? transportKiosque : transport;
    const totalCV = alimentMois + emballages + transportMois + veto;
    const salairePrime = Math.round(salaire * (1 + primePerf / 100));

    const pointMortPonte = poulesEff > 0 ? Math.round((pointMortPlat * 30 * 100) / (poulesEff * 30)) : 0;
    const cashFlow = [];

    for (let m = 1; m <= 27; m++) {
      let dec = 0, rec = 0, phase = "";
      if (m <= 3) { dec = Math.round(budgetTotal * 0.6 / 3) + (m === 3 ? Math.round(budgetTotal * 0.09) : 0); phase = m === 3 ? "Poussins" : "Construction"; }

      cumul += rec - dec;

    }
    const creuxMax = Math.min(...cashFlow.map(c => c.cumul));
