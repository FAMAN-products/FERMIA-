<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERMIA — Farm Intelligence Hub</title>
  <meta name="description" content="FERMIA - Plateforme SaaS de gestion intelligente de fermes avicoles. Dashboard quotidien, sante animale, simulateur financier, agents IA.">
  <meta property="og:title" content="FERMIA — Farm Intelligence Hub">
  <meta property="og:description" content="Gestion intelligente de fermes avicoles. Production, sante, finances — augmente par l'IA.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%231A3A2A'/><text x='16' y='22' text-anchor='middle' font-size='16' font-family='Georgia' font-weight='bold' fill='%23C5A44E'>F</text></svg>">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0F1F16">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0A1A10;color:#fff}
    input[type="range"]{-webkit-appearance:none;background:#2D5A3D;border-radius:4px;outline:none;height:6px}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#C5A44E;cursor:pointer;border:2px solid #1A3A2A}
    input[type="number"]{-moz-appearance:textfield}
    input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
    input,select,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(197,164,78,0.3);border-radius:3px}
    a{text-decoration:none;color:inherit}
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0A1A10;color:#C5A44E;font-family:Georgia,serif;font-size:18px">FERMIA</div></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ========== MODULE 1 ==========
    const Mod1 = (() => {

const F = "#1A3A2A", G = "#C5A44E", W = "#FFFFFF", BG = "#0F1F16", C1 = "#2D5A3D", C2 = "#1A3A2A";
const GOLD_L = "#D4B86A", GOLD_D = "#A08030";

const fmt = (n) => new Intl.NumberFormat("fr-FR").format(Math.round(n));
const fmtM = (n) => {
  if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(1).replace(".", ",") + "M";
  if (Math.abs(n) >= 1000) return Math.round(n / 1000) + "K";
  return fmt(n);
};

function Mod1Comp() {
  const [tauxPonte, setTauxPonte] = useState(78);
  const [prixAliment, setPrixAliment] = useState(380);
  const [prixVenteMoyen, setPrixVenteMoyen] = useState(2750);
  const [nbPoules, setNbPoules] = useState(1900);
  const [showKiosque, setShowKiosque] = useState(false);
  const [prixKiosque, setPrixKiosque] = useState(3250);
  const [partKiosque, setPartKiosque] = useState(30);
  const [consoJour, setConsoJour] = useState(120);
  const [prixAlveole, setPrixAlveole] = useState(25);
  const [transport, setTransport] = useState(60000);
  const [transportKiosque, setTransportKiosque] = useState(90000);
  const [veto, setVeto] = useState(40000);
  const [salaire, setSalaire] = useState(75000);
  const [primePerf, setPrimePerf] = useState(10);
  const [entretien, setEntretien] = useState(30000);
  const [groupe, setGroupe] = useState(15000);
  const [telDivers, setTelDivers] = useState(25000);
  const [caFientes, setCaFientes] = useState(50000);
  const [prixReforme, setPrixReforme] = useState(1500);
  const [budgetTotal, setBudgetTotal] = useState(29500000);
  const [dureeAmort, setDureeAmort] = useState(10);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showAdvanced, setShowAdvanced] = useState(false);

  const data = useMemo(() => {
    const poulesEff = nbPoules;
    const oeufJour = Math.round(poulesEff * (tauxPonte / 100));
    const platJour = oeufJour / 30;
    const platMois = Math.round(platJour * 30);
    const prixPlateau = showKiosque
      ? Math.round(prixVenteMoyen * ((100 - partKiosque) / 100) + prixKiosque * (partKiosque / 100))
      : prixVenteMoyen;
    const caOeufs = platMois * prixPlateau;
    const caTotal = caOeufs + caFientes;
    const alimentMois = Math.round(poulesEff * (consoJour / 1000) * 30 * prixAliment);
    const emballages = platMois * prixAlveole;
    const transportMois = showKiosque ? transportKiosque : transport;
    const totalCV = alimentMois + emballages + transportMois + veto;
    const salairePrime = Math.round(salaire * (1 + primePerf / 100));
    const totalCF = salairePrime + entretien + groupe + telDivers;
    const amortMois = Math.round(budgetTotal / dureeAmort / 12);
    const resultatAvantAmort = caTotal - totalCV - totalCF;
    const resultatNet = resultatAvantAmort - amortMois;
    const margeNette = caTotal > 0 ? (resultatNet / caTotal) * 100 : 0;
    const margePlat = platMois > 0 ? prixPlateau - (alimentMois / platMois) - prixAlveole : 0;
    const pointMortPlat = margePlat > 0 ? Math.round((totalCF + amortMois) / margePlat) : 9999;
    const pointMortPonte = poulesEff > 0 ? Math.round((pointMortPlat * 30 * 100) / (poulesEff * 30)) : 0;
    const cashFlow = [];
    let cumul = 0;
    for (let m = 1; m <= 27; m++) {
      let dec = 0, rec = 0, phase = "";
      if (m <= 3) { dec = Math.round(budgetTotal * 0.6 / 3) + (m === 3 ? Math.round(budgetTotal * 0.09) : 0); phase = m === 3 ? "Poussins" : "Construction"; }
      else if (m <= 5) { dec = Math.round(nbPoules * 1.1 * 1.5 * prixAliment / 2) + salaire + 150000; phase = "Poussinière"; }
      else if (m <= 8) { dec = Math.round(nbPoules * 1.05 * 4.5 * prixAliment / 3.5) + salaire + 50000; phase = "Poulette"; }
      else if (m === 9) { const pl9 = Math.round(poulesEff * 0.5); dec = alimentMois + totalCF; rec = pl9 * prixPlateau + caFientes; phase = "Début ponte"; }
      else if (m === 10) { const pl10 = Math.round(poulesEff * 0.75); dec = totalCV + totalCF; rec = pl10 * prixPlateau + caFientes; phase = "Montée"; }
      else { dec = totalCV + totalCF; rec = caTotal; phase = m === 27 ? "Réforme" : "Production"; if (m === 27) rec += Math.round(poulesEff * 0.95 * prixReforme); }
      cumul += rec - dec;
      cashFlow.push({ mois: "M" + m, decaissement: -dec, recette: rec, solde: rec - dec, cumul, phase });
    }
    const creuxMax = Math.min(...cashFlow.map(c => c.cumul));
    const creuxMois = cashFlow.findIndex(c => c.cumul === creuxMax) + 1;
    const paybackIdx = cashFlow.findIndex(cf => cf.cumul >= 0);
    const payback = paybackIdx >= 0 ? paybackIdx + 1 : 30;
    const scenarios = [
      { nom: "Optimiste", ponte: 85, color: "#4ADE80" },
      { nom: "Réaliste", ponte: 78, color: G },
      { nom: "Dégradé", ponte: 65, color: "#F59E0B" },
      { nom: "Critique", ponte: 55, color: "#EF4444" },
    ].map(s => {
      const pl = Math.round(poulesEff * (s.ponte / 100));
      const ca = pl * prixPlateau + caFientes;
      const cv = alimentMois + pl * prixAlveole + transportMois + veto;
      const rn = ca - cv - totalCF - amortMois;
      return { ...s, plateaux: pl, ca, resultat: rn, marge: ca > 0 ? (rn / ca * 100).toFixed(1) : 0 };
    });
    return { oeufJour, platJour: Math.round(platJour * 10) / 10, platMois, prixPlateau, caOeufs, caTotal, alimentMois, emballages, transportMois, totalCV, salairePrime, totalCF, amortMois, resultatAvantAmort, resultatNet, margeNette, pointMortPlat, pointMortPonte, cashFlow, creuxMax, creuxMois, payback, scenarios };
  }, [tauxPonte, prixAliment, prixVenteMoyen, nbPoules, showKiosque, prixKiosque, partKiosque, consoJour, prixAlveole, transport, transportKiosque, veto, salaire, primePerf, entretien, groupe, telDivers, caFientes, prixReforme, budgetTotal, dureeAmort]);

  const Slider = ({ label, value, onChange, min, max, step = 1, unit = "", info }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
        <span style={{ color: GOLD_L, fontSize: 12, fontFamily: "Georgia, serif" }}>{label}</span>
        <span style={{ color: W, fontSize: 18, fontWeight: 700, fontFamily: "Georgia, serif" }}>{fmt(value)} {unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} style={{ width: "100%", accentColor: G, height: 5, cursor: "pointer" }} />
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#5A7A6A", marginTop: 1 }}>
        <span>{fmt(min)}</span>{info && <span style={{ color: GOLD_D, fontStyle: "italic" }}>{info}</span>}<span>{fmt(max)}</span>
      </div>
    </div>
  );

  const NumInput = ({ label, value, onChange, unit = "FCFA", step = 1000, min = 0, max = 99999999, info }) => (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid " + G + "11", flexWrap: "wrap", gap: 4 }}>
      <div style={{ flex: "1 1 160px" }}>
        <span style={{ color: "#AAC4B4", fontSize: 12 }}>{label}</span>
        {info && <span style={{ color: GOLD_D, fontSize: 10, marginLeft: 6, fontStyle: "italic" }}>{info}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <button onClick={() => onChange(Math.max(min, value - step))} style={{ width: 26, height: 26, borderRadius: 4, border: "1px solid " + G + "44", background: "transparent", color: GOLD_L, cursor: "pointer", fontSize: 14 }}>−</button>
        <input type="number" value={value} onChange={e => { const v = Number(e.target.value); if (!isNaN(v) && v >= min && v <= max) onChange(v); }}
          style={{ width: 85, textAlign: "right", background: C2, border: "1px solid " + G + "33", borderRadius: 4, color: W, padding: "4px 8px", fontSize: 13, fontFamily: "Georgia, serif", fontWeight: 600 }} />
        <button onClick={() => onChange(Math.min(max, value + step))} style={{ width: 26, height: 26, borderRadius: 4, border: "1px solid " + G + "44", background: "transparent", color: GOLD_L, cursor: "pointer", fontSize: 14 }}>+</button>
        <span style={{ color: "#6B8F7B", fontSize: 11, width: 40, textAlign: "right" }}>{unit}</span>
      </div>
    </div>
  );

  const KPI = ({ label, value, unit = "", color = W, sub, alert }) => (
    <div style={{ background: "linear-gradient(135deg, " + C2 + "ee, " + C1 + "aa)", border: "1px solid " + (alert ? "#EF4444" : G) + "33", borderRadius: 12, padding: "14px 16px", flex: 1, minWidth: 130 }}>
      <div style={{ fontSize: 10, color: GOLD_L, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontFamily: "Georgia, serif" }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 800, color, fontFamily: "Georgia, serif" }}>{value}<span style={{ fontSize: 12, fontWeight: 400, marginLeft: 3 }}>{unit}</span></div>
      {sub && <div style={{ fontSize: 10, color: "#6B8F7B", marginTop: 3 }}>{sub}</div>}
    </div>
  );

  const Tab = ({ id, label, icon }) => (
    <button onClick={() => setActiveTab(id)} style={{ background: activeTab === id ? G : "transparent", color: activeTab === id ? F : GOLD_L, border: "1px solid " + (activeTab === id ? G : G + "44"), borderRadius: 8, padding: "9px 14px", cursor: "pointer", fontSize: 12, fontWeight: activeTab === id ? 700 : 500, fontFamily: "Georgia, serif", display: "flex", alignItems: "center", gap: 5 }}>
      <span style={{ fontSize: 15 }}>{icon}</span> {label}
    </button>
  );

  const Panel = ({ children, style = {} }) => (
    <div style={{ background: C2 + "cc", border: "1px solid " + G + "22", borderRadius: 12, padding: 20, marginBottom: 16, ...style }}>{children}</div>
  );

  const STitle = ({ icon, text }) => (
    <div style={{ fontSize: 13, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 14, letterSpacing: 0.8 }}>{icon} {text}</div>
  );

  const rentable = data.resultatNet > 0;
  const alertMarge = data.margeNette < 15;
  const alimentPctCA = data.caTotal > 0 ? (data.alimentMois / data.caTotal * 100) : 0;

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, " + BG + " 0%, #0A1A10 100%)", color: W, fontFamily: "Segoe UI, system-ui, sans-serif" }}>
      <div style={{ background: "linear-gradient(135deg, " + F + " 0%, " + C1 + " 100%)", borderBottom: "2px solid " + G, padding: "16px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <div style={{ width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg, " + G + ", " + GOLD_D + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, color: F, fontFamily: "Georgia, serif" }}>F</div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "Georgia, serif", color: G, letterSpacing: 1 }}>FERMIA</div>
            <div style={{ fontSize: 11, color: GOLD_L, letterSpacing: 1.5, textTransform: "uppercase" }}>Module 1 — Simulateur Financier</div>
          </div>
          <div style={{ marginLeft: "auto", textAlign: "right" }}>
            <div style={{ fontSize: 10, color: "#6B8F7B" }}>Budget</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: G, fontFamily: "Georgia, serif" }}>{fmtM(budgetTotal)} FCFA</div>
          </div>
        </div>
      </div>

      <div style={{ padding: "16px 14px", maxWidth: 900, margin: "0 auto" }}>
        {/* PARAMÈTRES PRINCIPAUX */}
        <Panel>
          <STitle icon="⚙" text="PARAMÈTRES PRINCIPAUX" />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 16 }}>
            <Slider label="Taux de ponte" value={tauxPonte} onChange={setTauxPonte} min={40} max={95} unit="%" info="Réaliste : 78%" />
            <Slider label="Prix aliment / kg" value={prixAliment} onChange={setPrixAliment} min={200} max={450} step={10} unit="FCFA" info="Industriel : 380" />
            <Slider label="Prix vente plateau" value={prixVenteMoyen} onChange={setPrixVenteMoyen} min={2200} max={3500} step={50} unit="FCFA" info="IPRAVI : 2 400" />
            <Slider label="Poules effectives" value={nbPoules} onChange={setNbPoules} min={500} max={5000} step={100} unit="têtes" info="Palier 1 : 1 900" />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 12, padding: "8px 14px", background: showKiosque ? G + "22" : "transparent", borderRadius: 8, border: "1px solid " + G + "33", cursor: "pointer" }} onClick={() => setShowKiosque(!showKiosque)}>
            <div style={{ width: 18, height: 18, borderRadius: 4, border: "2px solid " + G, background: showKiosque ? G : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: F, fontWeight: 900 }}>{showKiosque ? "✓" : ""}</div>
            <span style={{ fontSize: 12, color: GOLD_L }}>🛒 Kiosques Cocody/Riviera</span>
          </div>
          {showKiosque && (
            <div style={{ marginTop: 10, paddingLeft: 10, borderLeft: "2px solid " + G + "44" }}>
              <Slider label="Prix kiosque / plateau" value={prixKiosque} onChange={setPrixKiosque} min={2800} max={4000} step={50} unit="FCFA" />
              <Slider label="Part kiosque du volume" value={partKiosque} onChange={setPartKiosque} min={10} max={60} unit="%" />
            </div>
          )}
        </Panel>

        {/* PARAMÈTRES AVANCÉS */}
        <div style={{ border: "1px solid " + G + "22", borderRadius: 12, marginBottom: 16, overflow: "hidden", background: showAdvanced ? C2 + "cc" : "transparent" }}>
          <button onClick={() => setShowAdvanced(!showAdvanced)} style={{ width: "100%", background: C2, border: "none", padding: "12px 20px", color: GOLD_L, fontSize: 13, fontFamily: "Georgia, serif", fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", letterSpacing: 0.5 }}>
            <span>🔧 PARAMÈTRES AVANCÉS — charges, revenus, investissement</span>
            <span style={{ fontSize: 18, transform: showAdvanced ? "rotate(180deg)" : "none", transition: "0.2s" }}>▾</span>
          </button>
          {showAdvanced && (
            <div style={{ padding: "16px 20px" }}>
              <div style={{ fontSize: 12, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 8 }}>🌾 ALIMENTATION</div>
              <NumInput label="Consommation / poule / jour" value={consoJour} onChange={setConsoJour} unit="g" step={5} max={200} info="Norme : 120g" />
              <NumInput label="Prix alvéole (30 œufs)" value={prixAlveole} onChange={setPrixAlveole} unit="FCFA" step={5} max={100} />

              <div style={{ fontSize: 12, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 8, marginTop: 16 }}>🚚 CHARGES VARIABLES</div>
              <NumInput label="Transport / livraison (standard)" value={transport} onChange={setTransport} step={5000} max={200000} />
              {showKiosque && <NumInput label="Transport avec kiosques" value={transportKiosque} onChange={setTransportKiosque} step={5000} max={300000} />}
              <NumInput label="Vétérinaire / prophylaxie" value={veto} onChange={setVeto} step={5000} max={200000} />

              <div style={{ fontSize: 12, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 8, marginTop: 16 }}>🏠 CHARGES FIXES</div>
              <NumInput label="Salaire manœuvre (base)" value={salaire} onChange={setSalaire} step={5000} max={200000} />
              <NumInput label="Prime performance" value={primePerf} onChange={setPrimePerf} unit="%" step={5} max={50} />
              <NumInput label="Entretien bâtiment + litière" value={entretien} onChange={setEntretien} step={5000} max={200000} />
              <NumInput label="Groupe électrogène + carburant" value={groupe} onChange={setGroupe} step={5000} max={100000} />
              <NumInput label="Téléphone + divers" value={telDivers} onChange={setTelDivers} step={5000} max={100000} />

              <div style={{ fontSize: 12, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 8, marginTop: 16 }}>💵 REVENUS COMPLÉMENTAIRES</div>
              <NumInput label="Vente fientes / mois" value={caFientes} onChange={setCaFientes} step={10000} max={300000} />
              <NumInput label="Prix poule réformée" value={prixReforme} onChange={setPrixReforme} step={100} max={3000} />

              <div style={{ fontSize: 12, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 8, marginTop: 16 }}>🏗 INVESTISSEMENT</div>
              <NumInput label="Budget total projet" value={budgetTotal} onChange={setBudgetTotal} step={500000} max={50000000} />
              <NumInput label="Durée amortissement" value={dureeAmort} onChange={setDureeAmort} unit="ans" step={1} min={3} max={20} />

              <div style={{ marginTop: 16, textAlign: "center" }}>
                <button onClick={() => { setConsoJour(120); setPrixAlveole(25); setTransport(60000); setTransportKiosque(90000); setVeto(40000); setSalaire(75000); setPrimePerf(10); setEntretien(30000); setGroupe(15000); setTelDivers(25000); setCaFientes(50000); setPrixReforme(1500); setBudgetTotal(29500000); setDureeAmort(10); }}
                  style={{ background: "transparent", border: "1px solid " + G + "44", borderRadius: 8, color: GOLD_L, padding: "8px 20px", cursor: "pointer", fontSize: 12 }}>
                  ↺ Réinitialiser les valeurs par défaut
                </button>
              </div>
            </div>
          )}
        </div>

        {/* NAVIGATION */}
        <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
          <Tab id="dashboard" label="Dashboard" icon="📊" />
          <Tab id="exploitation" label="Exploitation" icon="📋" />
          <Tab id="cashflow" label="Cash-flow" icon="💰" />
          <Tab id="scenarios" label="Scénarios" icon="🎯" />
        </div>

        {activeTab === "dashboard" && (
          <div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
              <KPI label="Résultat net / mois" value={fmtM(data.resultatNet)} unit="FCFA" color={rentable ? "#4ADE80" : "#EF4444"} sub={rentable ? "✓ Rentable" : "⚠ Déficitaire"} alert={!rentable} />
              <KPI label="Marge nette" value={data.margeNette.toFixed(1)} unit="%" color={alertMarge ? "#F59E0B" : G} sub={alertMarge ? "⚠ Serrée" : "Confortable"} alert={alertMarge} />
              <KPI label="Point mort" value={data.pointMortPonte} unit="% ponte" color={data.pointMortPonte > 70 ? "#EF4444" : G} sub={fmt(data.pointMortPlat) + " plat./mois"} />
              <KPI label="Payback" value={"M" + data.payback} color={data.payback > 30 ? "#EF4444" : G} sub={data.payback <= 27 ? "Avant fin cycle 1" : "Après cycle 1"} />
            </div>
            <Panel>
              <STitle icon="🥚" text="PRODUCTION QUOTIDIENNE" />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
                {[["Œufs/jour", data.oeufJour, W], ["Plateaux/jour", data.platJour, W], ["Plateaux/mois", data.platMois, G]].map(([l, v, c], i) => (
                  <div key={i}><div style={{ fontSize: 10, color: "#6B8F7B" }}>{l}</div><div style={{ fontSize: 20, fontWeight: 700, color: c, fontFamily: "Georgia, serif" }}>{typeof v === "number" && v % 1 === 0 ? fmt(v) : v}</div></div>
                ))}
              </div>
            </Panel>
            <Panel>
              <STitle icon="💵" text="SYNTHÈSE MENSUELLE" />
              {[
                { label: "Chiffre d'affaires", value: data.caTotal, color: "#4ADE80", bold: true },

    return { poulesEff, eggsToday, tauxPonte, last7, last7Eggs, last7Mort, last7Dates, avg7Ponte, totalMort7, criticalAlerts, highAlerts, avgBagsPerDay };
  }, [records, alerts, flock]);

  // ===== UI COMPONENTS =====
  const NumBtn = ({ label, value, onChange, icon, unit, big }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontSize: 13, color: GL, marginBottom: 6, fontFamily: "Georgia, serif" }}>{icon} {label}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={() => onChange(String(Math.max(0, (parseInt(value) || 0) - (big ? 10 : 1))))} style={{
          width: 48, height: 48, borderRadius: 10, background: F, border: `1px solid ${G}44`,
          color: GL, fontSize: 22, fontWeight: 700, cursor: "pointer"
        }}>−</button>
        <input type="number" inputMode="numeric" value={value} onChange={e => onChange(e.target.value)}
          style={{
            flex: 1, height: 48, textAlign: "center", fontSize: 24, fontWeight: 700,
            background: `${F}ee`, border: `2px solid ${G}44`, borderRadius: 10,
            color: "white", fontFamily: "Georgia, serif"
          }} />
        <button onClick={() => onChange(String((parseInt(value) || 0) + (big ? 10 : 1)))} style={{
          width: 48, height: 48, borderRadius: 10, background: G, border: "none",
          color: F, fontSize: 22, fontWeight: 700, cursor: "pointer"
        }}>+</button>
        {unit && <span style={{ color: "#6B8F7B", fontSize: 12, width: 30 }}>{unit}</span>}
      </div>
    </div>
  );

  const KPI = ({ label, value, unit = "", color = "white", sub, icon }) => (
    <div style={{ background: `linear-gradient(135deg, ${F}ee, ${C1}aa)`, border: `1px solid ${G}33`, borderRadius: 12, padding: "12px 14px", flex: 1, minWidth: 120 }}>
      <div style={{ fontSize: 10, color: GL, textTransform: "uppercase", letterSpacing: 0.8, fontFamily: "Georgia, serif" }}>{icon} {label}</div>
      <div style={{ fontSize: 24, fontWeight: 800, color, fontFamily: "Georgia, serif", marginTop: 4 }}>
        {value ?? "—"}<span style={{ fontSize: 12, fontWeight: 400, marginLeft: 3 }}>{unit}</span>
      </div>
      {sub && <div style={{ fontSize: 10, color: "#6B8F7B", marginTop: 2 }}>{sub}</div>}
    </div>
  );

  const MiniBar = ({ data, maxVal, color = G, height = 80, labels }) => (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height, padding: "0 2px" }}>
      {data.map((v, i) => {
        const h = maxVal > 0 ? (v / maxVal * 100) : 0;
        return (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
            <div style={{ fontSize: 8, color: GL, marginBottom: 2 }}>{v > 0 ? v : ""}</div>
            <div style={{ width: "100%", height: `${Math.max(h, 3)}%`, background: color, borderRadius: "3px 3px 0 0", opacity: 0.8 }} />
            {labels && <div style={{ fontSize: 7, color: "#6B8F7B", marginTop: 2 }}>{labels[i]?.slice(-5)}</div>}
          </div>
        );
      })}
    </div>
  );

  const SevBadge = ({ severity }) => {
    const map = { critical: { bg: "#DC354522", color: "#EF4444", label: "CRITIQUE" }, high: { bg: "#F59E0B22", color: "#F59E0B", label: "ÉLEVÉ" }, moderate: { bg: `${G}22`, color: G, label: "MODÉRÉ" }, info: { bg: "#3B82F622", color: "#3B82F6", label: "INFO" } };
    const s = map[severity] || map.info;
    return <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 8px", borderRadius: 10, background: s.bg, color: s.color, letterSpacing: 0.5 }}>{s.label}</span>;
  };

  // Calendar
  const calendarDays = useMemo(() => {
    const { y, m } = calMonth;
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const days = [];
    const adjustedFirst = firstDay === 0 ? 6 : firstDay - 1; // Monday start
    for (let i = 0; i < adjustedFirst; i++) days.push(null);
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const rec = records.find(r => r.record_date === dateStr);
      let status = "none";
      if (rec) {
        const eggs = (rec.eggs_morning || 0) + (rec.eggs_midday || 0) + (rec.eggs_evening || 0);
        const poulesEff = flock?.current_count || 1900;
        const tp = poulesEff > 0 ? eggs / poulesEff * 100 : 0;
        if (rec.mortality > 2 || tp < 60) status = "red";
        else if (tp < 75 || rec.mortality > 0) status = "yellow";
        else status = "green";
      }
      days.push({ day: d, date: dateStr, status, hasData: !!rec });
    }
    return days;
  }, [calMonth, records, flock]);

  if (loading) {
    return (
      <div style={{ minHeight: "100vh", background: `linear-gradient(180deg, ${BG}, #0A1A10)`, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
        <div style={{ fontSize: 20, color: G, fontFamily: "Georgia, serif", fontWeight: 700 }}>FERMIA</div>
        <div style={{ fontSize: 12, color: "#6B8F7B" }}>Chargement des données...</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(180deg, ${BG} 0%, #0A1A10 100%)`, color: "white", fontFamily: "'Segoe UI', system-ui, sans-serif" }}>

      <div style={{ background: `linear-gradient(135deg, ${F}, ${C1})`, borderBottom: `3px solid ${G}`, padding: "12px 16px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: "50%", background: `linear-gradient(135deg, ${G}, ${GD})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, color: F, fontFamily: "Georgia, serif" }}>F</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 800, color: G, fontFamily: "Georgia, serif", letterSpacing: 1 }}>FERMIA</div>
            <div style={{ fontSize: 9, color: GL, letterSpacing: 1.5, textTransform: "uppercase" }}>Module 2 — Dashboard quotidien</div>
          </div>
          {/* Mode toggle */}
          <div style={{ display: "flex", gap: 0, background: `${F}`, borderRadius: 8, border: `1px solid ${G}44`, overflow: "hidden" }}>
            {[{ id: "saisie", label: "📝 Saisie" }, { id: "dashboard", label: "📊 Suivi" }].map(m => (

                padding: "8px 14px", border: "none", fontSize: 11, fontWeight: mode === m.id ? 700 : 400,
                background: mode === m.id ? G : "transparent", color: mode === m.id ? F : GL,

              {flock && (

              <NumBtn label="Sacs ouverts (distribués)" icon="📤" value={form.feed_bags_opened} onChange={v => setForm(p => ({ ...p, feed_bags_opened: v }))} />
              <NumBtn label="Eau consommée (litres estimés)" icon="💧" value={form.water_liters} onChange={v => setForm(p => ({ ...p, water_liters: v }))} big unit="L" />
            </div>

            {/* Temperature */}
            <div style={{ background: `${F}cc`, border: `1px solid ${G}22`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
              <div style={{ fontSize: 14, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 14 }}>🌡️ TEMPÉRATURE</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <div style={{ fontSize: 11, color: GL, marginBottom: 4 }}>🌅 Matin (10h)</div>
                  <input type="number" inputMode="decimal" step="0.5" value={form.temp_morning} onChange={e => setForm(p => ({ ...p, temp_morning: e.target.value }))}
                    placeholder="°C" style={{ width: "100%", height: 44, textAlign: "center", fontSize: 20, fontWeight: 700, background: `${F}ee`, border: `2px solid ${G}44`, borderRadius: 10, color: "white", fontFamily: "Georgia, serif" }} />
                </div>
                <div>
                  <div style={{ fontSize: 11, color: GL, marginBottom: 4 }}>☀️ Après-midi (14h)</div>
                  <input type="number" inputMode="decimal" step="0.5" value={form.temp_afternoon} onChange={e => setForm(p => ({ ...p, temp_afternoon: e.target.value }))}
                    placeholder="°C" style={{ width: "100%", height: 44, textAlign: "center", fontSize: 20, fontWeight: 700, background: `${F}ee`, border: `2px solid ${parseFloat(form.temp_afternoon) > 32 ? "#EF4444" : G}44`, borderRadius: 10, color: parseFloat(form.temp_afternoon) > 32 ? "#EF4444" : "white", fontFamily: "Georgia, serif" }} />
                </div>
              </div>
              {parseFloat(form.temp_afternoon) > 32 && (
                <div style={{ marginTop: 8, padding: "6px 10px", background: "#DC354522", borderRadius: 8, fontSize: 11, color: "#EF4444" }}>

            {/* Notes */}
            <div style={{ background: `${F}cc`, border: `1px solid ${G}22`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
              <div style={{ fontSize: 14, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 10 }}>📝 OBSERVATIONS</div>
              <textarea value={form.notes} onChange={e => setForm(p => ({ ...p, notes: e.target.value }))} rows={3}
                placeholder="Comportement anormal, problème observé, visite véto..."
                style={{ width: "100%", background: `${F}ee`, border: `1px solid ${G}33`, borderRadius: 10, color: "white", padding: 12, fontSize: 14, resize: "vertical", fontFamily: "inherit" }} />
            </div>

            {/* Save button */}
            <button onClick={handleSave} disabled={saving} style={{
              width: "100%", padding: "16px", background: saving ? "#6B8F7B" : G, border: "none",
              borderRadius: 14, fontSize: 18, fontWeight: 800, color: F, cursor: saving ? "default" : "pointer",
              fontFamily: "Georgia, serif", letterSpacing: 1, boxShadow: "0 4px 16px rgba(197,164,78,0.3)"
            }}>
              {saving ? "Enregistrement..." : "💾 ENREGISTRER"}
            </button>
            {saveMsg && (
              <div style={{ textAlign: "center", marginTop: 10, fontSize: 14, fontWeight: 600, color: saveMsg.includes("✓") ? "#4ADE80" : "#EF4444" }}>{saveMsg}</div>
            )}
          </div>
        )}

        {/* ===== MODE DASHBOARD ===== */}
        {mode === "dashboard" && (
          <div>
            {/* KPIs */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
              <KPI icon="🥚" label="Ponte du jour" value={computed.tauxPonte !== null ? computed.tauxPonte.toFixed(1) : null} unit="%" color={computed.tauxPonte !== null ? (computed.tauxPonte >= 75 ? "#4ADE80" : computed.tauxPonte >= 60 ? "#F59E0B" : "#EF4444") : "#6B8F7B"} sub={computed.eggsToday !== null ? `${fmt(computed.eggsToday)} œufs` : "Pas de saisie"} />
              <KPI icon="📈" label="Moyenne 7j" value={computed.avg7Ponte > 0 ? computed.avg7Ponte.toFixed(1) : null} unit="%" color={computed.avg7Ponte >= 75 ? "#4ADE80" : G} sub={`${computed.last7.length} jours de données`} />
              <KPI icon="☠️" label="Mortalité 7j" value={computed.totalMort7} color={computed.totalMort7 > 5 ? "#EF4444" : computed.totalMort7 > 0 ? "#F59E0B" : "#4ADE80"} sub={`Cheptel : ${fmt(flock?.current_count || 0)}`} />
            </div>

            {/* 7-day trends */}
            <div style={{ background: `${F}cc`, border: `1px solid ${G}22`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 10 }}>📈 TENDANCES 7 JOURS</div>
              {computed.last7.length > 0 ? (
                <div>
                  <div style={{ fontSize: 11, color: GL, marginBottom: 4 }}>Œufs collectés / jour</div>
                  <MiniBar data={computed.last7Eggs} maxVal={Math.max(...computed.last7Eggs, 1)} color={G} labels={computed.last7Dates} />
                  {computed.totalMort7 > 0 && (
                    <div style={{ marginTop: 12 }}>
                      <div style={{ fontSize: 11, color: GL, marginBottom: 4 }}>Mortalité / jour</div>
                      <MiniBar data={computed.last7Mort} maxVal={Math.max(...computed.last7Mort, 5)} color="#EF4444" labels={computed.last7Dates} height={50} />
                    </div>
                  )}
                </div>
              ) : (
                <div style={{ textAlign: "center", color: "#6B8F7B", fontSize: 13, padding: 20 }}>Pas encore de données — commencez par la saisie 📝</div>
              )}
            </div>

            {/* Alerts */}
            <div style={{ background: `${F}cc`, border: `1px solid ${G}22`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 10 }}>
                🔔 ALERTES {alerts.filter(a => !a.acknowledged).length > 0 && <span style={{ background: "#EF4444", color: "white", borderRadius: 10, padding: "2px 8px", fontSize: 10, marginLeft: 6 }}>{alerts.filter(a => !a.acknowledged).length}</span>}
              </div>
              {alerts.length === 0 ? (
                <div style={{ textAlign: "center", color: "#4ADE80", fontSize: 13, padding: 16 }}>✓ Aucune alerte active</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {alerts.slice(0, 8).map(a => (
                    <div key={a.id} style={{
                      padding: "10px 12px", borderRadius: 10,
                      background: a.acknowledged ? `${F}44` : (a.severity === "critical" ? "#DC354515" : a.severity === "high" ? "#F59E0B11" : `${G}11`),
                      border: `1px solid ${a.severity === "critical" ? "#EF444444" : G + "22"}`,
                      opacity: a.acknowledged ? 0.6 : 1,
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: "white" }}>{a.title}</span>

                          <button onClick={() => ackAlert(a.id)} style={{ fontSize: 10, padding: "4px 10px", borderRadius: 6, background: `${G}33`, border: `1px solid ${G}44`, color: GL, cursor: "pointer" }}>👁 Vu</button>
                        )}
                        <button onClick={() => resolveAlert(a.id)} style={{ fontSize: 10, padding: "4px 10px", borderRadius: 6, background: "#4ADE8022", border: "1px solid #4ADE8044", color: "#4ADE80", cursor: "pointer" }}>✓ Résolu</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Calendar */}
            <div style={{ background: `${F}cc`, border: `1px solid ${G}22`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <button onClick={() => setCalMonth(p => { const m = p.m - 1; return m < 0 ? { y: p.y - 1, m: 11 } : { ...p, m }; })}
                  style={{ width: 32, height: 32, borderRadius: 8, background: F, border: `1px solid ${G}44`, color: GL, fontSize: 16, cursor: "pointer" }}>‹</button>

                  <button onClick={addEvent} style={{ flex: 1, padding: "12px", background: G, border: "none", borderRadius: 10, color: F, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Enregistrer</button>
                  <button onClick={() => setShowAddEvent(false)} style={{ padding: "12px 20px", background: "transparent", border: `1px solid ${G}44`, borderRadius: 10, color: GL, cursor: "pointer" }}>Annuler</button>
                </div>
              </Panel>
            )}

            {/* Events list */}
            {events.length === 0 ? (
              <div style={{ textAlign: "center", padding: 30, color: "#6B8F7B" }}>Aucun événement enregistré</div>
            ) : (
              events.map(ev => (
                <div key={ev.id} style={{
                  padding: "12px 14px", marginBottom: 8, borderRadius: 10,
                  background: `${F}cc`, border: `1px solid ${G}15`,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>
                      {TypeIcon[ev.event_type] || "📋"} {ev.product_name}
                    </span>
                    <span style={{ fontSize: 10, color: "#6B8F7B" }}>{dateLabelShort(ev.event_date)}</span>
                  </div>
                  <div style={{ fontSize: 11, color: "#AAC4B4" }}>
                    {TypeLabel[ev.event_type]} {ev.dose && `• ${ev.dose}`} {ev.administration && `• ${ev.administration.replace("_", " ")}`}
                  </div>
                  {ev.notes && <div style={{ fontSize: 11, color: "#6B8F7B", marginTop: 4, fontStyle: "italic" }}>{ev.notes}</div>}
                  {ev.scheduled && <span style={{ fontSize: 9, color: G, marginTop: 2, display: "inline-block" }}>📅 Planifié (calendrier vaccinal)</span>}
                </div>
              ))
            )}
          </div>
        )}

        {/* ===== PHARMACIE ===== */}
        {tab === "pharmacie" && (
          <div>
            {/* Alerts */}
            {(expired.length > 0 || expiringSoon.length > 0) && (
              <Panel style={{ border: `1px solid #EF444444`, background: "#DC354511" }}>
                {expired.map(p => (
                  <div key={p.id} style={{ fontSize: 12, color: "#EF4444", marginBottom: 4 }}>
                    🔴 <strong>{p.product_name}</strong> — périmé depuis {dateLabel(p.expiry_date)}
                  </div>
                ))}
                {expiringSoon.map(p => (
                  <div key={p.id} style={{ fontSize: 12, color: "#F59E0B", marginBottom: 4 }}>
                    🟡 <strong>{p.product_name}</strong> — périme le {dateLabel(p.expiry_date)} ({daysDiff(today(), p.expiry_date)}j)
                  </div>
                ))}
              </Panel>
            )}

            <button onClick={() => setShowAddPharma(true)} style={{
              width: "100%", padding: "12px", background: `${G}22`, border: `1px dashed ${G}66`,
              borderRadius: 12, color: GL, fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 16,
            }}>+ Ajouter un produit</button>

            {showAddPharma && (
              <Panel style={{ border: `2px solid ${G}44` }}>
                <div style={{ fontSize: 14, color: G, fontWeight: 700, fontFamily: "Georgia, serif", marginBottom: 14 }}>Nouveau produit</div>
                <TextField label="Nom du produit" value={formPharma.product_name} onChange={v => setFormPharma(p => ({ ...p, product_name: v }))} placeholder="Ex: Vaccin Newcastle LaSota" />
                <SelectField label="Type" value={formPharma.product_type} onChange={v => setFormPharma(p => ({ ...p, product_type: v }))}
                  options={[{ value: "vaccin", label: "💉 Vaccin" }, { value: "antibiotique", label: "💊 Antibiotique" }, { value: "antiparasitaire", label: "🪱 Antiparasitaire" }, { value: "vitamine", label: "🧴 Vitamine" }, { value: "desinfectant", label: "🧹 Désinfectant" }, { value: "autre", label: "📦 Autre" }]} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <TextField label="Quantité" type="number" value={formPharma.quantity} onChange={v => setFormPharma(p => ({ ...p, quantity: parseFloat(v) || 0 }))} />
                  <TextField label="Unité" value={formPharma.unit} onChange={v => setFormPharma(p => ({ ...p, unit: v }))} placeholder="flacon, sachet..." />
                </div>
                <TextField label="Date de péremption" type="date" value={formPharma.expiry_date} onChange={v => setFormPharma(p => ({ ...p, expiry_date: v }))} />
                <TextField label="Notes" value={formPharma.notes} onChange={v => setFormPharma(p => ({ ...p, notes: v }))} placeholder="Stockage, précautions..." />
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  <button onClick={addPharma} style={{ flex: 1, padding: "12px", background: G, border: "none", borderRadius: 10, color: F, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Enregistrer</button>
                  <button onClick={() => setShowAddPharma(false)} style={{ padding: "12px 20px", background: "transparent", border: `1px solid ${G}44`, borderRadius: 10, color: GL, cursor: "pointer" }}>Annuler</button>
                </div>
              </Panel>
            )}

            {/* Pharmacy list */}
            {pharmacy.map(p => {
              const isExpired = p.expiry_date && daysDiff(today(), p.expiry_date) < 0;
              const isSoon = p.expiry_date && daysDiff(today(), p.expiry_date) <= 30 && !isExpired;
              const typeIcons = { vaccin: "💉", antibiotique: "💊", antiparasitaire: "🪱", vitamine: "🧴", desinfectant: "🧹", autre: "📦" };
              return (
                <div key={p.id} style={{
                  padding: "12px 14px", marginBottom: 6, borderRadius: 10,
                  background: isExpired ? "#DC354511" : `${F}cc`,
                  border: `1px solid ${isExpired ? "#EF444444" : isSoon ? "#F59E0B44" : G + "15"}`,
                  opacity: isExpired ? 0.7 : 1,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>
                      {typeIcons[p.product_type] || "📦"} {p.product_name}
                    </span>
                    <span style={{ fontSize: 14, fontWeight: 700, color: p.quantity <= 0 ? "#EF4444" : G, fontFamily: "Georgia, serif" }}>
                      {p.quantity} {p.unit}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: "#6B8F7B", marginTop: 4 }}>
                    {p.expiry_date && (
                      <span style={{ color: isExpired ? "#EF4444" : isSoon ? "#F59E0B" : "#6B8F7B" }}>
                        {isExpired ? "⛔ Périmé" : isSoon ? "⚠ Périme bientôt" : "📅 Expire"} {dateLabel(p.expiry_date)}
                      </span>
                    )}
                    {p.notes && <span style={{ marginLeft: 8 }}>{p.notes}</span>}
                  </div>
                </div>
              );
            })}
            {pharmacy.length === 0 && (
              <div style={{ textAlign: "center", padding: 30, color: "#6B8F7B" }}>Pharmacie vide</div>
            )}
          </div>
        )}

        {/* Footer */}
        <div style={{ textAlign: "center", padding: "20px 0 12px", fontSize: 10, color: "#4A6A5A", borderTop: `1px solid ${G}22`, marginTop: 20 }}>
          FERMIA — Module 3 — Santé & vaccination
          <div style={{ fontSize: 9, marginTop: 3 }}>F.A.M.A.N • N'chompo • Agboville</div>
        </div>
      </div>
    </div>
  );
}

      return Mod3Comp;
    })();

    // ========== APP ==========
    function FermiaApp() {
      const [activeMod, setActiveMod] = useState(null);

        { id:"logistique", comp:null, icon:"🚚", num:"M5", title:"Logistique & Stock", desc:"Approvisionnement intrants, tra\u00e7abilit\u00e9 lots \u0153ufs, planning livraisons.", color:"#F59E0B", ready:false },
        { id:"rh", comp:null, icon:"👥", num:"M6", title:"RH & \u00c9quipe", desc:"Fiches employ\u00e9s, pointage, KPIs performance, prime transparente.", color:"#EC4899", ready:false },
        { id:"ia", comp:null, icon:"🧠", num:"M7", title:"Hub IA Central", desc:"6 agents IA : V\u00e9to, Tendances, Formulation, Commercial, Rapporteur, Vision.", color:"#14B8A6", ready:false },
      ];

      if (activeMod) {
        const mod = modules.find(m => m.id === activeMod);
        if (!mod || !mod.comp) { setActiveMod(null); return null; }
        const Comp = mod.comp;
        return (
          <div style={{ minHeight:"100vh", background:"linear-gradient(180deg,"+BG+",#060F08)" }}>
            <div style={{ background:F, borderBottom:"2px solid "+G+"44", padding:"10px 20px", position:"sticky", top:0, zIndex:300, display:"flex", alignItems:"center", gap:14 }}>
              <button onClick={() => setActiveMod(null)} style={{ width:36, height:36, borderRadius:8, background:G+"15", border:"1px solid "+G+"33", color:GL, fontSize:16, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>\u2190</button>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:20 }}>{mod.icon}</span>
                <span style={{ fontSize:15, fontWeight:700, color:"white", fontFamily:"Georgia,serif" }}>{mod.title}</span>
              </div>
              <div style={{ marginLeft:"auto", padding:"3px 10px", background:mod.color+"15", border:"1px solid "+mod.color+"33", borderRadius:6, fontSize:10, color:mod.color, fontWeight:700 }}>{mod.num}</div>
            </div>
            <Comp />
          </div>

      }

              <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                <span style={{ fontSize:18, fontWeight:800, color:G, fontFamily:"Georgia,serif", letterSpacing:1.5 }}>FERMIA</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <span style={{ fontSize:11, color:"#6B8F7B", display:isMobile?"none":"block" }}>Farm Intelligence Hub</span>
                <div style={{ padding:"5px 14px", background:G+"15", border:"1px solid "+G+"33", borderRadius:6, fontSize:11, color:GL, fontWeight:600 }}>v1.0</div>
              </div>
            </div>

          {/* HERO */}
          <div style={{ background:"linear-gradient(135deg,"+F+" 0%,"+C1+" 50%,"+F+" 100%)", borderBottom:"2px solid "+G+"33", padding: isMobile ? "40px 20px" : "60px 24px", textAlign:"center", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, background:"radial-gradient(circle at 30% 50%, "+G+"08 0%, transparent 50%), radial-gradient(circle at 70% 50%, "+G+"05 0%, transparent 50%)", pointerEvents:"none" }} />
            <div style={{ position:"relative", maxWidth:700, margin:"0 auto" }}>
              <div style={{ width:72, height:72, borderRadius:16, background:"linear-gradient(135deg,"+G+","+GD+")", display:"flex", alignItems:"center", justifyContent:"center", fontSize:28, fontWeight:900, color:F, fontFamily:"Georgia,serif", margin:"0 auto 20px", boxShadow:"0 8px 32px rgba(197,164,78,0.3)" }}>F</div>
              <h1 style={{ fontSize: isMobile ? 32 : 42, fontWeight:800, color:"white", fontFamily:"Georgia,serif", letterSpacing:3, marginBottom:12 }}>FERMIA</h1>
              <p style={{ fontSize: isMobile ? 13 : 15, color:GL, letterSpacing:2, textTransform:"uppercase", marginBottom:16 }}>Farm Intelligence Hub</p>
              <p style={{ fontSize: isMobile ? 13 : 15, color:"#AAC4B4", lineHeight:1.6, maxWidth:500, margin:"0 auto" }}>Plateforme de gestion intelligente pour fermes avicoles. Production, sant\u00e9 animale, finances \u2014 augment\u00e9 par l'IA.</p>
              <div style={{ display:"flex", gap:16, justifyContent:"center", marginTop:24, flexWrap:"wrap" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#6B8F7B" }}><span style={{ width:8, height:8, borderRadius:"50%", background:"#4ADE80", display:"inline-block" }} /> 3 modules actifs</div>
                <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:"#6B8F7B" }}><span style={{ width:8, height:8, borderRadius:"50%", background:G, display:"inline-block" }} /> Supabase connect\u00e9</div>

                  background: mod.ready ? "linear-gradient(135deg,"+C2+","+F+")" : F+"66",

                      <div style={{ fontSize:10, color:mod.color, fontWeight:600, marginBottom:6, opacity: mod.ready ? 1 : 0.5 }}>{mod.num}</div>

                  <div style={{ width:24, height:24, borderRadius:6, background:"linear-gradient(135deg,"+G+","+GD+")", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:F, fontFamily:"Georgia,serif" }}>F</div>
                  <span style={{ fontSize:14, fontWeight:700, color:G, fontFamily:"Georgia,serif", letterSpacing:1 }}>FERMIA</span>
                </div>
                <div style={{ fontSize:11, color:"#6B8F7B" }}>Farm Intelligence Hub — by F.A.M.A.N</div>
              </div>
              <div style={{ textAlign: isMobile ? "center" : "right" }}>
                <div style={{ fontSize:11, color:"#5A7A6A" }}>Ferme Avicole Marie Akanda N'Goh</div>
                <div style={{ fontSize:11, color:"#5A7A6A", marginTop:2 }}>N'chompo \u2022 Agboville \u2022 C\u00f4te d'Ivoire</div>
                <div style={{ fontSize:10, color:"#4A6A5A", marginTop:6 }}>\u00c9levage Responsable — By Y.E.</div>
              </div>
            </div>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FermiaApp));
  </script>
